name: Smoke Check

on:
  push:
    branches: ["master"]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas scipy pymc arviz matplotlib streamlit

      - name: Static syntax compile
        run: |
          python -m py_compile run_inference.py
          python -m py_compile cache_manager.py
          python -m py_compile health_check.py

      - name: Health check
        run: python health_check.py

      - name: Fast deterministic inference smoke
        run: python run_inference.py --fast --advi-steps 500 --seed 42 --output-path ci_posteriors.nc
