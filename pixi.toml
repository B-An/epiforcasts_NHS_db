[workspace]
name = "epiforecasts-nhs-pressure"
version = "0.1.0"
description = "Probabilistic NHS Winter / System Pressure Early Warning"
channels = ["conda-forge"]
# Local reliability-first default for this workspace.
platforms = ["win-64"]

[dependencies]
python = ">=3.10,<3.13"
# Lets PyTensor compile C ops (much faster than pure Python). See docs/PYTENSOR_COMPILER.md
cxx-compiler = "*"

[pypi-dependencies]
numpy = "*"
pandas = "*"
scipy = "*"
pymc = "*"
arviz = "*"
matplotlib = "*"
streamlit = "*"

[tasks]
generate-data = "python generate_synthetic_data.py"
run-inference = "python run_inference.py"
run-inference-full = "python run_inference.py --full"
daemon = "python inference_daemon.py"
daemon-once = "python inference_daemon.py --once"
cache-warm = "python cache_manager.py warm"
cache-check = "python cache_manager.py check"
cache-status = "python cache_manager.py status"
cache-clear = "python cache_manager.py clear"
health-check = "python health_check.py"
acceptance-check = "python acceptance_check.py"
run-dashboard = "python launch_streamlit.py --app app.py --preferred-port 8501 --max-port 8510"
run-dashboard-fast = "python launch_streamlit.py --app app_fast.py --preferred-port 8501 --max-port 8510"
run-dashboard-resilient = "python run_dashboard_resilient.py --app app.py --preferred-port 8501 --max-port 8510 --fallback-on-any-failure"
run-dashboard-fast-resilient = "python run_dashboard_resilient.py --app app_fast.py --preferred-port 8501 --max-port 8510 --fallback-on-any-failure"
evidence-cycle = "python log_evidence_run.py --run-inference-fast"
run-full-pipeline = { cmd = "python generate_synthetic_data.py && python run_inference.py && python launch_streamlit.py --app app.py --preferred-port 8501 --max-port 8510", description = "Generate data, run inference, then launch dashboard" }
dev = { cmd = "python generate_synthetic_data.py && python inference_daemon.py --once && python launch_streamlit.py --app app_fast.py --preferred-port 8501 --max-port 8510", description = "Development setup: data + single inference + fast UI" }
